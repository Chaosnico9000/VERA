name: Release VERA

on:
  push:
    branches:
      - master
      - main

jobs:

  # --- 1. Version aus csproj lesen -----------------------------------------
  read-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag:     ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Version auslesen
        id: v
        run: |
          VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' VERA.Client/VERA.Client.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT

  # --- 2a. Server ZIP bauen -------------------------------------------------
  build-server:
    needs: read-version
    runs-on: ubuntu-latest
    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: NuGet-Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-server-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: nuget-server-
      - name: Publish VERA.Server
        run: dotnet publish VERA.Server/VERA.Server.csproj -c Release -r linux-x64 --no-self-contained -o ./publish/vera-server
      - name: ZIP erstellen
        run: cd publish && zip -r ../vera-server.zip vera-server/
      - uses: actions/upload-artifact@v4
        with:
          name: vera-server
          path: vera-server.zip

  # --- 2b. Android APK bauen und signieren ----------------------------------
  build-android:
    needs: read-version
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: microsoft

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # NuGet-Pakete cachen — spart ~30–60s bei Folge-Builds
      - name: NuGet-Cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: nuget-android-${{ hashFiles('**/*.csproj', '**/global.json') }}
          restore-keys: nuget-android-

      # MAUI-Workload cachen — spart ~2–3 Min bei Folge-Builds
      - name: MAUI-Workload-Cache
        id: workload-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.dotnet/sdk-manifests
            ~/.dotnet/workloads
            /usr/local/share/dotnet/sdk-manifests
            /usr/local/share/dotnet/packs
          key: maui-workload-${{ runner.os }}-${{ hashFiles('**/global.json') }}-net10
          restore-keys: maui-workload-${{ runner.os }}-

      - name: MAUI Android Workload installieren
        if: steps.workload-cache.outputs.cache-hit != 'true'
        run: dotnet workload install maui-android --skip-sign-check

      - name: Keystore dekodieren
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > vera.keystore

      - name: Android APK bauen und signieren
        run: |
          dotnet publish VERA.Client/VERA.Client.csproj \
            -f net10.0-android -c Release \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore=${{ github.workspace }}/vera.keystore \
            -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -p:AndroidSupportedAbis=arm64-v8a \
            -p:RunAOTCompilation=false \
            -p:PublishTrimmed=false

      - name: APK kopieren
        run: |
          APK=$(find VERA.Client/bin/Release/net10.0-android -name "*-Signed.apk" | head -1)
          [ -z "$APK" ] && APK=$(find VERA.Client/bin/Release/net10.0-android -name "*.apk" | head -1)
          cp "$APK" vera-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: vera-android
          path: vera-android.apk

  # --- 3. GitHub Release erstellen ------------------------------------------
  release:
    needs: [read-version, build-server, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions:  read
    steps:
      - uses: actions/checkout@v4

      - name: Server-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: vera-server
          path: .

      - name: Android-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: vera-android
          path: .

      - name: Assets pruefen
        run: |
          ls -la
          [ -f vera-server.zip  ] || { echo "FEHLER: vera-server.zip fehlt!";  exit 1; }
          [ -f vera-android.apk ] || { echo "FEHLER: vera-android.apk fehlt!"; exit 1; }

      - name: Git-Tag setzen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.read-version.outputs.tag }} || echo "Tag existiert bereits"
          git push origin ${{ needs.read-version.outputs.tag }} --force

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ needs.read-version.outputs.tag }}
          name:        "VERA ${{ needs.read-version.outputs.version }}"
          make_latest: true
          draft:       false
          prerelease:  false
          files: |
            vera-server.zip
            vera-android.apk
          body: |
            ## VERA ${{ needs.read-version.outputs.version }}

            Automatisch gebaut aus Branch `${{ github.ref_name }}` - Commit `${{ github.sha }}`

            ---

            ### Android installieren
            1. `vera-android.apk` herunterladen
            2. Auf dem Geraet oeffnen (Unbekannte Quellen erlauben)
            3. Installieren - die App prueft automatisch auf neue Versionen

            ---

            ### Server installieren (Pelican)
            Das Egg laedt `vera-server.zip` beim Start automatisch herunter.
            Standard-URL: `http://panel.chaosfritten.de:27022`