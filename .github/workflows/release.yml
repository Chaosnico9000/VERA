name: Release VERA Server

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Releases, Tags und Uploads
      actions: read      # Workflow-Metadaten lesen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version aus VERA.csproj auslesen
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' VERA/VERA.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish VERA.Server (linux-x64, self-contained=false)
        run: |
          dotnet publish VERA.Server/VERA.Server.csproj \
            -c Release \
            -r linux-x64 \
            --no-self-contained \
            -o ./publish/vera-server

      - name: Zip Artefakt
        run: |
          cd publish
          zip -r ../vera-server.zip vera-server/

      - name: Git-Tag setzen (falls noch nicht vorhanden)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} || echo "Tag existiert bereits, wird überschrieben"
          git push origin ${{ steps.version.outputs.tag }} --force

      - name: GitHub Release erstellen & ZIP hochladen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: vera-server.zip
          name: "VERA ${{ steps.version.outputs.version }}"
          body: |
            ## VERA Server ${{ steps.version.outputs.version }}

            Automatisch gebaut aus Branch `${{ github.ref_name }}` — Commit `${{ github.sha }}`

            ### Installation (Pelican/Pterodactyl)
            Das Egg (`pelican-egg.json`) lädt diese ZIP automatisch beim Server-Start herunter.

            ### Manuell installieren
            ```bash
            wget https://github.com/Chaosnico9000/VERA/releases/latest/download/vera-server.zip
            unzip vera-server.zip
            dotnet VERA.Server.dll
            ```

            Siehe [Deployment-Guide](https://github.com/Chaosnico9000/VERA/blob/master/docs/DEPLOYMENT.md) für Details.
          make_latest: true
          draft: false
          prerelease: false
