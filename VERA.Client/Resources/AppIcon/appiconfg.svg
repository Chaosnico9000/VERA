<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <!--
    VERA Foreground Icon
    Adaptive Icon safe zone: innerhalb der mittleren 66 % = ca. 676 x 676 px (Offset 174,174).
    Der Text ist als Pfade kodiert – keine Systemschrift nötig.

    Layout:
      · Großes "VERA" als Haupttext  – horizontal zentriert, vertikal leicht über Mitte
      · Kleiner Punkt (·) als Dekorelement links vom V
  -->

  <!-- ── Hintergrund transparent (wird vom appicon.svg geliefert) ── -->

  <!-- ── Gradient-Akzent: Cyan → Blau → Violett (VERA-Palette) ──── -->
  <defs>
    <linearGradient id="veraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00C8F0"/>
      <stop offset="50%"  stop-color="#3566E5"/>
      <stop offset="100%" stop-color="#8240CE"/>
    </linearGradient>
  </defs>

  <!--
    "VERA" – rendert als weißen Block-Text mit Gradient-Unterstrich.
    Da wir kein font embedding machen, nutzen wir geometry paths.

    Buchstaben-Pfade: manuell konstruiert, serifenlos, Bold, Höhe ~320 px,
    Baseline bei y=560, Gesamtbreite ~670 px, zentriert auf x=512.

    V  – Breite 170, Start x=177
    E  – Breite 145, Start x=367
    R  – Breite 150, Start x=532
    A  – Breite 165, Start x=702
  -->

  <!-- V -->
  <polygon points="177,240  247,240  370,530  493,240  563,240  390,580  350,580"
           fill="white"/>

  <!-- E -->
  <rect x="367" y="240" width="55"  height="340" fill="white"/>
  <rect x="367" y="240" width="145" height="55"  fill="white"/>
  <rect x="367" y="392" width="120" height="50"  fill="white"/>
  <rect x="367" y="525" width="145" height="55"  fill="white"/>

  <!-- R -->
  <rect x="532" y="240" width="55"  height="340" fill="white"/>
  <rect x="532" y="240" width="145" height="55"  fill="white"/>
  <rect x="532" y="392" width="120" height="50"  fill="white"/>
  <!-- Diagonale Keule -->
  <polygon points="632,442  682,442  762,580  700,580" fill="white"/>

  <!-- A -->
  <polygon points="784,240  826,240  934,580  874,580  805,378  736,580  676,580"
           fill="white"/>
  <!-- Querbalken A -->
  <rect x="718" y="430" width="120" height="48" fill="#080C1E"/>

  <!-- ── Gradient-Unterstrich ───────────────────────────────────── -->
  <rect x="177" y="608" width="670" height="14" rx="7" fill="url(#veraGrad)"/>

  <!-- ── Kleiner Akzent-Punkt (links oben, VERA-Cyan) ─────────── -->
  <circle cx="148" cy="270" r="28" fill="#00C8F0"/>

</svg>
